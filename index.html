<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>節奏 X 光掃描機</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p.instruction {
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* 輸送帶背景設計 */
        #conveyor-belt {
            background-color: #34495e;
            width: 100%;
            max-width: 900px;
            padding: 30px 10px;
            border-radius: 15px;
            box-shadow: inset 0px 5px 15px rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-around;
            position: relative;
            overflow: hidden;
            border: 5px solid #7f8c8d;
        }

        /* 輸送帶上的動態條紋，增加視覺效果 */
        #conveyor-belt::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 40px,
                rgba(0, 0, 0, 0.1) 40px,
                rgba(0, 0, 0, 0.1) 80px
            );
            animation: moveBelt 2s linear infinite;
            z-index: 0;
        }

        @keyframes moveBelt {
            0% { background-position: 0 0; }
            100% { background-position: -80px 0; }
        }

        /* 音符箱子設計 */
        .note-box {
            background-color: rgba(255, 255, 255, 0.9);
            color: #2c3e50;
            font-size: 2.5rem; /* 音符放大 */
            padding: 20px;
            border-radius: 10px;
            border: 4px solid #bdc3c7;
            cursor: pointer;
            z-index: 1; /* 確保在輸送帶條紋上方 */
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 180px;
            height: 80px;
            letter-spacing: 5px;
        }

        .note-box:hover {
            transform: scale(1.05);
            box-shadow: 0px 8px 15px rgba(0,0,0,0.3);
            background-color: #fff;
            border-color: #3498db;
        }

        /* 答錯時的震動動畫 */
        .shake {
            animation: shake 0.4s;
            background-color: #e74c3c !important;
            color: white;
            border-color: #c0392b !important;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        /* 答對時的動畫 */
        .correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60 !important;
            transform: scale(1.1);
        }

        #message {
            margin-top: 30px;
            font-size: 1.8rem;
            font-weight: bold;
            height: 40px;
        }

        #score-board {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <h1>🔍 節奏 X 光掃描機</h1>
    <p class="instruction">安檢員請注意！輸送帶上有 4 個節奏箱子，其中有 <strong>1 個</strong> 搗蛋鬼長得跟別人不一樣，請把它找出來並點擊它！</p>

    <div id="conveyor-belt">
        </div>

    <div id="message"></div>
    <div id="score-board">過關數：<span id="score">0</span></div>

    <script>
        // 題庫設計：correct 是正常的頻現句，wrong 是用來混淆的搗蛋鬼
        const levels = [
            { correct: "♩ ♫ ♩ 𝄽", wrong: "♩ ♩ ♩ 𝄽" },
            { correct: "♫ ♫ ♩ ♩", wrong: "♫ ♩ ♩ ♩" },
            { correct: "♩ 𝄽 ♩ 𝄽", wrong: "♩ 𝄽 ♫ 𝄽" },
            { correct: "♩ ♫ ♫ ♩", wrong: "♩ ♫ ♩ ♩" },
            { correct: "♫ 𝄽 ♫ 𝄽", wrong: "♫ 𝄽 ♩ 𝄽" }
        ];

        let currentScore = 0;
        let isClickable = true; // 防止動畫期間重複點擊

        const belt = document.getElementById('conveyor-belt');
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');

        // 初始化遊戲回合
        function initRound() {
            isClickable = true;
            messageDisplay.textContent = "";
            belt.innerHTML = ""; // 清空輸送帶

            // 隨機選一題
            const randomLevelIndex = Math.floor(Math.random() * levels.length);
            const levelData = levels[randomLevelIndex];

            // 決定搗蛋鬼要放在哪一個位置 (0 到 3 之間)
            const imposterIndex = Math.floor(Math.random() * 4);

            // 產生 4 個箱子
            for (let i = 0; i < 4; i++) {
                const box = document.createElement('div');
                box.classList.add('note-box');
                
                // 如果是搗蛋鬼的位置，就放入錯誤的節奏；否則放入正確的頻現句
                if (i === imposterIndex) {
                    box.textContent = levelData.wrong;
                    box.dataset.isImposter = "true";
                } else {
                    box.textContent = levelData.correct;
                    box.dataset.isImposter = "false";
                }

                // 加入點擊事件
                box.addEventListener('click', function() {
                    handleBoxClick(this);
                });

                belt.appendChild(box);
            }
        }

        // 處理玩家點擊箱子
        function handleBoxClick(boxElement) {
            if (!isClickable) return; // 如果正在播放動畫，不允許點擊

            const isImposter = boxElement.dataset.isImposter === "true";

            if (isImposter) {
                // 答對了！抓到搗蛋鬼
                isClickable = false;
                boxElement.classList.add('correct');
                messageDisplay.style.color = "#2ecc71";
                messageDisplay.textContent = "🎉 答對了！你抓到搗蛋鬼了！";
                currentScore++;
                scoreDisplay.textContent = currentScore;

                // 停頓 1.5 秒後進入下一關
                setTimeout(() => {
                    initRound();
                }, 1500);

            } else {
                // 答錯了！
                isClickable = false;
                boxElement.classList.add('shake');
                messageDisplay.style.color = "#e74c3c";
                messageDisplay.textContent = "❌ 哎呀，這箱是正常的！再找找看！";

                // 移除震動動畫並允許重新點擊
                setTimeout(() => {
                    boxElement.classList.remove('shake');
                    isClickable = true;
                    messageDisplay.textContent = "";
                }, 800);
            }
        }

        // 遊戲開始
        initRound();

    </script>
</body>
</html>
