<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>節奏 X 光掃描機</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        p.instruction {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        /* 遊戲區域（包含輸送帶和結算畫面） */
        #game-container {
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        /* 進度條設計 */
        #progress-board {
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 15px;
            background: #fff;
            padding: 5px 20px;
            border-radius: 20px;
            display: inline-block;
        }

        /* 輸送帶背景設計 */
        #conveyor-belt {
            background-color: #34495e;
            width: 100%;
            padding: 30px 10px;
            border-radius: 15px;
            box-shadow: inset 0px 5px 15px rgba(0,0,0,0.6);
            display: flex;
            justify-content: space-around;
            position: relative;
            overflow: hidden;
            border: 5px solid #7f8c8d;
            box-sizing: border-box;
        }

        #conveyor-belt::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 40px,
                rgba(0, 0, 0, 0.1) 40px,
                rgba(0, 0, 0, 0.1) 80px
            );
            animation: moveBelt 2s linear infinite;
            z-index: 0;
        }

        @keyframes moveBelt {
            0% { background-position: 0 0; }
            100% { background-position: -80px 0; }
        }

        /* 音符箱子設計 */
        .note-box {
            background-color: rgba(255, 255, 255, 0.9);
            color: #2c3e50;
            font-size: 2.5rem;
            padding: 20px;
            border-radius: 10px;
            border: 4px solid #bdc3c7;
            cursor: pointer;
            z-index: 1;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 180px;
            height: 80px;
            letter-spacing: 5px;
        }

        .note-box:hover {
            transform: scale(1.05);
            box-shadow: 0px 8px 15px rgba(0,0,0,0.3);
            background-color: #fff;
            border-color: #3498db;
        }

        /* 動畫效果 */
        .shake {
            animation: shake 0.4s;
            background-color: #e74c3c !important;
            color: white;
            border-color: #c0392b !important;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        .correct {
            background-color: #2ecc71 !important;
            color: white;
            border-color: #27ae60 !important;
            transform: scale(1.1);
        }

        #message {
            margin-top: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            height: 40px;
        }

        /* 過關結算畫面隱藏/顯示 */
        #end-screen {
            display: none; /* 預設隱藏 */
            background-color: #27ae60;
            padding: 50px;
            border-radius: 15px;
            border: 5px solid #2ecc71;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #end-screen h2 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        button {
            background-color: #f1c40f;
            color: #2c3e50;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 5px 0px #f39c12;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        button:active {
            transform: translateY(5px);
            box-shadow: 0px 0px 0px #f39c12;
        }
    </style>
</head>
<body>

    <h1>🔍 節奏 X 光掃描機</h1>
    <p class="instruction">安檢員請注意！輸送帶上有 4 個節奏箱子，其中有 <strong>1 個</strong> 搗蛋鬼長得跟別人不一樣，請把它找出來！</p>

    <div id="progress-board">目前進度：<span id="current-q">1</span> / 10</div>

    <div id="game-container">
        <div id="conveyor-belt"></div>

        <div id="end-screen">
            <h2>🌟 太棒了！任務完成 🌟</h2>
            <p style="font-size: 1.5rem; margin-bottom: 30px;">你成功找出了 10 個搗蛋鬼，擁有超級好眼力！</p>
            <button onclick="startGame()">再玩一次</button>
        </div>
    </div>

    <div id="message"></div>

    <script>
        const levels = [
            { correct: "♩ ♫ ♩ 𝄽", wrong: "♩ ♩ ♩ 𝄽" },
            { correct: "♫ ♫ ♩ ♩", wrong: "♫ ♩ ♩ ♩" },
            { correct: "♩ 𝄽 ♩ 𝄽", wrong: "♩ 𝄽 ♫ 𝄽" },
            { correct: "♩ ♫ ♫ ♩", wrong: "♩ ♫ ♩ ♩" },
            { correct: "♫ 𝄽 ♫ 𝄽", wrong: "♫ 𝄽 ♩ 𝄽" },
            { correct: "♩ ♩ ♫ ♫", wrong: "♩ 𝄽 ♫ ♫" },
            { correct: "♫ ♩ ♫ ♩", wrong: "♫ ♩ ♩ ♩" }
        ];

        const MAX_QUESTIONS = 10;
        let currentQuestion = 1;
        let isClickable = true;

        const belt = document.getElementById('conveyor-belt');
        const endScreen = document.getElementById('end-screen');
        const messageDisplay = document.getElementById('message');
        const progressDisplay = document.getElementById('current-q');

        // 開始新的一局（重置所有進度）
        function startGame() {
            currentQuestion = 1;
            progressDisplay.textContent = currentQuestion;
            endScreen.style.display = "none";
            belt.style.display = "flex";
            messageDisplay.textContent = "";
            initRound();
        }

        // 初始化單一題目回合
        function initRound() {
            isClickable = true;
            messageDisplay.textContent = "";
            belt.innerHTML = ""; 

            const randomLevelIndex = Math.floor(Math.random() * levels.length);
            const levelData = levels[randomLevelIndex];
            const imposterIndex = Math.floor(Math.random() * 4);

            for (let i = 0; i < 4; i++) {
                const box = document.createElement('div');
                box.classList.add('note-box');
                
                if (i === imposterIndex) {
                    box.textContent = levelData.wrong;
                    box.dataset.isImposter = "true";
                } else {
                    box.textContent = levelData.correct;
                    box.dataset.isImposter = "false";
                }

                box.addEventListener('click', function() {
                    handleBoxClick(this);
                });

                belt.appendChild(box);
            }
        }

        // 處理點擊
        function handleBoxClick(boxElement) {
            if (!isClickable) return;

            const isImposter = boxElement.dataset.isImposter === "true";

            if (isImposter) {
                // 答對了
                isClickable = false;
                boxElement.classList.add('correct');
                messageDisplay.style.color = "#2ecc71";
                messageDisplay.textContent = "🎉 答對了！";

                setTimeout(() => {
                    if (currentQuestion >= MAX_QUESTIONS) {
                        // 滿 10 題，顯示過關畫面
                        showEndScreen();
                    } else {
                        // 進入下一題
                        currentQuestion++;
                        progressDisplay.textContent = currentQuestion;
                        initRound();
                    }
                }, 1200); // 1.2秒後換題

            } else {
                // 答錯了
                isClickable = false;
                boxElement.classList.add('shake');
                messageDisplay.style.color = "#e74c3c";
                messageDisplay.textContent = "❌ 哎呀，這箱是正常的！再找找看！";

                setTimeout(() => {
                    boxElement.classList.remove('shake');
                    isClickable = true;
                    messageDisplay.textContent = "";
                }, 800);
            }
        }

        // 顯示結算畫面
        function showEndScreen() {
            belt.style.display = "none";
            messageDisplay.textContent = "";
            endScreen.style.display = "block";
        }

        // 網頁載入時立刻開始遊戲
        startGame();

    </script>
</body>
</html>
